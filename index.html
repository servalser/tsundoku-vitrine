<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Tsundoku — Librairie manga</title>
<style>
  html, body {
    margin: 0; padding: 0;
    height: 100%; overflow: hidden;
    overflow-x: hidden;
    font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
  }
  #root { height: 100%; }
  * { box-sizing: border-box; }
  button { font-family: inherit; }
</style>
</head>
<body>
<div id="root"></div>

<!-- React 18 + ReactDOM -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<!-- Babel Standalone -->
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<!-- Tokens de design -->
<script type="text/babel" src="tsundoku/project/src/tokens.jsx?v=2"></script>

<!-- Split-screen d'entree -->
<script type="text/babel" src="tsundoku/project/src/split-a.jsx?v=2"></script>

<!-- Navbar + hero + sections page d'accueil -->
<script type="text/babel" src="tsundoku/project/src/shop-nav.jsx?v=2"></script>
<script type="text/babel" src="tsundoku/project/src/shop-sections.jsx?v=2"></script>

<!-- Pages du site -->
<script type="text/babel" src="tsundoku/project/src/page-event.jsx?v=2"></script>
<script type="text/babel" src="tsundoku/project/src/page-about.jsx?v=2"></script>
<script type="text/babel" src="tsundoku/project/src/page-contact.jsx?v=2"></script>

<script type="text/babel">

/* ═══════════════════════════════════════════════════════════════
   ComingSoonPage — page "en developpement"
   Affichee quand on clique sur Catalogue, Quizz, Compte, Reservations
   ═══════════════════════════════════════════════════════════════ */
function ComingSoonPage({ shop, theme, onBack, onToggleTheme, onShopSwitch, onNav, label }) {
  const S    = TSUNDOKU[shop];
  const dark = theme === 'dark';
  const bg   = dark ? '#0a0a12' : '#f7f5ef';
  const ink  = dark ? '#fff'    : '#111';
  const muted = dark ? 'rgba(255,255,255,.5)' : 'rgba(0,0,0,.5)';
  const bp   = useBreakpoint();

  return (
    <div style={{ width: '100%', background: bg, color: ink, fontFamily: FONTS.body, minHeight: '100vh' }}>
      <Navbar
        shop={shop} theme={theme} connected={false}
        active={label} onNav={onNav}
        onConnect={() => onNav('client')} onBack={onBack}
        onToggleTheme={onToggleTheme} onShopSwitch={onShopSwitch}
      />

      {/* Bloc principal */}
      <div style={{
        position: 'relative', overflow: 'hidden',
        padding: bp.isMobile ? '80px 20px 100px' : '120px 60px 160px',
        background: S.bg, borderBottom: `4px solid ${S.accent}`,
      }}>
        {/* Motif halftone */}
        <div style={{
          position: 'absolute', inset: 0, color: S.accent, opacity: .08,
          ...HALFTONE_MED, pointerEvents: 'none',
        }} />

        {/* Kanji decoratif de fond */}
        {!bp.isMobile && (
          <div style={{
            position: 'absolute', right: -40, top: -60,
            fontFamily: FONTS.jpDisplay, fontWeight: 900,
            fontSize: bp.isTablet ? 300 : 500,
            color: S.accent, opacity: .12, lineHeight: .82,
            pointerEvents: 'none',
          }}>工</div>
        )}

        <div style={{
          maxWidth: 700, margin: '0 auto', position: 'relative',
          textAlign: 'center',
        }}>
          {/* Kanji visible */}
          <div style={{
            fontFamily: FONTS.jpDisplay, fontWeight: 900,
            fontSize: bp.isMobile ? 72 : 100,
            color: S.accent, opacity: .5, marginBottom: 20,
          }}>工</div>

          {/* Titre — sans accents car FONTS.display = Crispy Tofu */}
          <h1 style={{
            fontFamily: FONTS.display,
            fontSize: bp.isMobile ? 42 : bp.isTablet ? 60 : 80,
            lineHeight: .9, margin: 0, letterSpacing: -3,
            color: '#fff',
            textShadow: `4px 4px 0 ${S.bgDeep}`,
          }}>
            Bientot<br />
            <span style={{ color: S.accent }}>disponible.</span>
          </h1>

          {/* Sous-texte */}
          <div style={{
            marginTop: 24, fontSize: bp.isMobile ? 15 : 17,
            lineHeight: 1.6, color: 'rgba(255,255,255,.7)',
            maxWidth: 440, margin: '24px auto 0',
          }}>
            Cette section est en cours de developpement.
            Revenez bientot ou passez en boutique pour en profiter directement.
          </div>

          {/* Bouton retour */}
          <button onClick={() => onNav('shop')} style={{
            marginTop: 40,
            background: S.accent, color: S.bgDeep, border: 'none',
            padding: bp.isMobile ? '14px 24px' : '16px 32px',
            fontWeight: 700, fontSize: bp.isMobile ? 12 : 14,
            letterSpacing: 3, textTransform: 'uppercase',
            borderRadius: 99, cursor: 'pointer', fontFamily: FONTS.body,
            boxShadow: `0 0 0 4px ${S.accent}44`,
          }}>Retour a l'accueil →</button>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════
   Site — version vitrine
   ═══════════════════════════════════════════════════════════════ */
function Site({ shop, onShopChange, theme, onThemeToggle }) {
  const [view, setView] = React.useState('choice');

  const nav = (v) => {
    setView(v);
    requestAnimationFrame(() => {
      const el = document.querySelector('[data-page-scroll]');
      if (el) el.scrollTop = 0;
    });
  };

  const pageProps = {
    shop, theme,
    connected: false,
    client: null,
    onConnect:      () => nav('client'),
    onBack:         () => nav('choice'),
    onToggleTheme:  onThemeToggle,
    onShopSwitch:   (s) => { onShopChange(s); },
    onNav:          nav,
  };

  return (
    <div style={{ width: '100%', height: '100%', position: 'relative' }}>

      {/* ── Split-screen ── */}
      {view === 'choice' && (
        <div
          style={{ width: '100%', height: '100%' }}
          onClick={(e) => {
            const rect = e.currentTarget.getBoundingClientRect();
            const picked = (e.clientX - rect.left) / rect.width < 0.5
              ? 'toulon' : 'marseille';
            onShopChange(picked);
            nav('shop');
          }}
        >
          <SplitScreenA width="100%" height="100%" animIntensity={1} />
        </div>
      )}

      {/* ── Pages ── */}
      {view !== 'choice' && (
        <div
          data-page-scroll
          style={{ width: '100%', height: '100%', overflowY: 'auto', overflowX: 'hidden' }}
        >
          {view === 'shop'    && <ShopHomepage {...pageProps} intensity={1} />}
          {view === 'event'   && <EventPage    {...pageProps} />}
          {view === 'about'   && <AboutPage    {...pageProps} />}
          {view === 'contact' && <ContactPage  {...pageProps} />}

          {/* Pages "en developpement" */}
          {view === 'catalog'     && <ComingSoonPage {...pageProps} label="Catalogue" />}
          {view === 'quizz'       && <ComingSoonPage {...pageProps} label="Quizz" />}
          {view === 'client'      && <ComingSoonPage {...pageProps} label="Compte" />}
          {view === 'calendrier'  && <ComingSoonPage {...pageProps} label="Calendrier" />}
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════
   App
   ═══════════════════════════════════════════════════════════════ */
function App() {
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const [theme, setTheme] = React.useState(prefersDark ? 'dark' : 'light');
  const [shop, setShop]   = React.useState('marseille');

  return (
    <div style={{ width: '100vw', height: '100vh' }}>
      <Site
        shop={shop}
        onShopChange={setShop}
        theme={theme}
        onThemeToggle={() => setTheme(t => t === 'dark' ? 'light' : 'dark')}
      />
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════
   Boot
   ═══════════════════════════════════════════════════════════════ */
function boot() {
  const ready =
    window.useBreakpoint   &&
    window.SplitScreenA    &&
    window.ShopHomepage    &&
    window.EventPage       &&
    window.AboutPage       &&
    window.ContactPage;

  if (!ready) return setTimeout(boot, 80);
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
}
boot();
</script>
</body>
</html>
